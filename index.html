<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Price</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: gold;
  margin-bottom: 5px;
}

h3 {
  text-align: center;
  color: #aaa;
  margin-bottom: 20px;
  font-weight: normal;
}

/* simple box */
.box {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #2a2a2a;
}

.label {
  color: #ddd;
}

.value {
  color: #00ff88;
}

/* chart */
.chart {
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

<h1>GOLD PRICE</h1>
<h3>Live Market (Demo + Chart)</h3>

<div class="box" id="list"></div>

<!-- TRADING VIEW -->
<div class="chart">
  <div class="tradingview-widget-container">
    <iframe
      src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=1&theme=dark"
      width="100%"
      height="300"
      frameborder="0"
      allowtransparency="true"
      scrolling="no">
    </iframe>
  </div>
</div>

</div>

<script>

let basePrice = 380;

const rates = [
  { name: "999", m: 1 },
  { name: "999.9", m: 1 },
  { name: "916", m: 0.916 },
  { name: "965", m: 0.965 },
  { name: "950", m: 0.950 },

  { name: "22K / BP", m: 0.916 },
  { name: "850", m: 0.850 },
  { name: "835 / EP", m: 0.835 },

  { name: "750 / 18K", m: 0.750 },
  { name: "700", m: 0.700 },

  { name: "585 / EC", m: 0.585 },
  { name: "375", m: 0.375 }
];

function update() {

  let price = basePrice + Math.sin(Date.now()/50000)*2;

  let html = "";

  rates.forEach(r => {
    html += `
      <div class="row">
        <div class="label">${r.name}</div>
        <div class="value">RM ${(price * r.m).toFixed(2)} /g</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

update();
setInterval(update, 3000);

</script>

</body>
</html>
