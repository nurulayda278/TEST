<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0a0a0a;
    color:#ddd;
}

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:gold;
    margin-bottom:5px;
}

h3{
    text-align:center;
    color:#888;
    font-weight:normal;
    margin-bottom:20px;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:#141414;
    border-radius:10px;
    overflow:hidden;
}

th,
td{
    padding:14px 12px;
    border-bottom:1px solid #222;
    text-align:center;   /* Center semua */
    vertical-align:middle;
}

th{
    background:#111;
    color:gold;
    font-weight:bold;
    letter-spacing:.5px;
}

tbody tr:hover{
    background:#1b1b1b;
}

td{
    color:#ccc;
}

/* COLORS */

.green{
    color:#00ff88;
    font-weight:bold;
}

.red{
    color:#ff4d4d;
    font-weight:bold;
}

/* CHART */

.chart{
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="container">

<h1>GOLD DASHBOARD</h1>
<h3>Live Buyback Price + Chart</h3>

<table>
<thead>
<tr>
<th width="40%">Purity</th>
<th width="60%">Buyback</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="chart">
<iframe
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=5&theme=dark&style=1"
width="100%"
height="350"
frameborder="0"
scrolling="no"
allowtransparency="true">
</iframe>
</div>

<div class="last-update">
    <span id="lastUpdate">🕒 Last Update : Loading...</span>
</div>

</div>

<script>

const rates=[
{name:"999",m:1},
{name:"999.9",m:1.01},
{name:"916 / 22K",m:0.916},
{name:"965",m:0.965},
{name:"950",m:0.950},
{name:"850",m:0.850},
{name:"835",m:0.835},
{name:"750 / 18K",m:0.750},
{name:"700",m:0.700},
{name:"585",m:0.585},
{name:"375",m:0.375}
];

let basePrice=380;
let prev={};

function update(){

let price=basePrice+Math.sin(Date.now()/60000)*2;

let html="";

rates.forEach(r=>{

let buyback=price*r.m*0.97;

let color="green";

if(prev[r.name]!==undefined){
if(buyback<prev[r.name]) color="red";
}

prev[r.name]=buyback;

html+=`
<tr>
<td>${r.name}</td>
<td class="${color}">RM ${buyback.toFixed(2)}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML=html;

const now = new Date();

document.getElementById("lastUpdate").innerHTML =
"🕒 Last Update : " +
now.toLocaleString("en-MY",{
    timeZone:"Asia/Kuala_Lumpur",
    year:"numeric",
    month:"short",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:false
}) + " MYT";

}

}
