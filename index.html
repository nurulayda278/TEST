<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Live Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #ddd;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: gold;
  margin-bottom: 5px;
}

h3 {
  text-align: center;
  color: #888;
  font-weight: normal;
  margin-bottom: 20px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #141414;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
}

th {
  background: #111;
  color: gold;
}

td {
  color: #ccc;
}

/* PRICE COLORS */
.green {
  color: #00ff88;
  font-weight: bold;
}

.red {
  color: #ff4d4d;
  font-weight: bold;
}

/* CHART */
.chart {
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

<h1>GOLD DASHBOARD</h1>
<h3>FOURKAY PRICE</h3>

<table>
  <thead>
    <tr>
      <th>Purity</th>
      <th>Buyback</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- LIVE CHART -->
<div class="chart">
  <iframe
    src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=5&theme=dark"
    width="100%"
    height="320"
    frameborder="0"
    scrolling="no">
  </iframe>
</div>

</div>

<script>

// ===== FIXED MUTU (NO CHANGE) =====
const rates = [
  { name: "999", m: 1 },
  { name: "999.9", m: 1 },
  { name: "916 / 22K", m: 0.916 },
  { name: "965", m: 0.965 },
  { name: "950", m: 0.950 },
  { name: "850", m: 0.850 },
  { name: "835", m: 0.835 },
  { name: "750 / 18K", m: 0.750 },
  { name: "700", m: 0.700 },
  { name: "585", m: 0.585 },
  { name: "375", m: 0.375 }
];

let basePrice = 380;

// simpan previous value
let prevPrice = {};

function update() {

  // smooth movement (tak extreme)
  let price = basePrice + Math.sin(Date.now() / 60000) * 2;

  let html = "";

  rates.forEach(r => {

    let value = price * r.m;
    let buyback = value * 0.97;

    // DEFAULT color
    let priceColor = "green";
    let buyColor = "green";

    // compare previous price
    if (prevPrice[r.name]) {
      if (value < prevPrice[r.name]) priceColor = "red";
      else priceColor = "green";

      if (buyback < prevPrice[r.name + "_b"]) buyColor = "red";
      else buyColor = "green";
    }

    prevPrice[r.name] = value;
    prevPrice[r.name + "_b"] = buyback;

    html += `
      <tr>
        <td>${r.name}</td>
        <td class="${priceColor}">RM ${value.toFixed(2)}</td>
        <td class="${buyColor}">RM ${buyback.toFixed(2)}</td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = html;
}

update();
setInterval(update, 3000);

</script>

</body>
</html>
