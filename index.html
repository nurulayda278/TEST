<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Dashboard</title>

<style>
body{
     margin:0;
    font-family:Arial,sans-serif;
    color:#ddd;
    position:relative;

    background:
    linear-gradient(135deg,
    #0d0d0d 0%,
    #2b2209 25%,
    #4b3b11 50%,
    #1a1a1a 75%,
    #0a0a0a 100%);
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:url("4K FINAL LOGO_page-0001.png") no-repeat center center;

    background-size:350px;

    opacity:0.08;

    z-index:-1;
}

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:gold;
    margin-bottom:5px;
}

h3{
    text-align:center;
    color:#888;
    font-weight:normal;
    margin-bottom:20px;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:#141414;
    border-radius:10px;
    overflow:hidden;
}

th,
td{
    padding:14px 12px;
    border-bottom:1px solid #222;
    text-align:center;   /* Center semua */
    vertical-align:middle;
}

th{
    background:#111;
    color:gold;
    font-weight:bold;
    letter-spacing:.5px;
}

tbody tr:hover{
    background:#1b1b1b;
}

td{
    color:#ccc;
}

/* COLORS */

.green{
    color:#00ff88;
    font-weight:bold;
}

.red{
    color:#ff4d4d;
    font-weight:bold;
}

/* CHART */

.chart{
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="container">

<h1>GOLD DASHBOARD</h1>
<h3>Live Buyback FOURKAY</h3>

<table>
<thead>
<tr>
<th width="40%">Purity</th>
<th width="60%">Buyback</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="chart">
<iframe
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=5&theme=dark&style=1"
width="100%"
height="350"
frameborder="0"
scrolling="no"
allowtransparency="true">
</iframe>
</div>

</div>

<script>

const rates=[
{name:"999(Jewelry)",m:1},
{name:"999.9",m:1.01},
{name:"916 / 22K",m:0.916},
{name:"965",m:0.965},
{name:"950",m:0.950},
{name:"850",m:0.850},
{name:"835",m:0.835},
{name:"750 / 18K",m:0.750},
{name:"700",m:0.700},
{name:"585",m:0.585},
{name:"375",m:0.375}
];

let basePrice=480;
let prev={};

function update(){

let price=basePrice+Math.sin(Date.now()/60000)*2;

let html="";

rates.forEach(r=>{

let buyback=price*r.m*0.97;

let color="green";

if(prev[r.name]!==undefined){
if(buyback<prev[r.name]) color="red";
}

prev[r.name]=buyback;

html+=`
<tr>
<td>${r.name}</td>
<td class="${color}">RM ${buyback.toFixed(2)}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML=html;

}

update();
setInterval(update,3000);

</script>

</body>
</html>
