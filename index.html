<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
}

.container{
max-width:550px;
margin:auto;
padding:20px;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:120px;
height:auto;
}

/* TITLE */

h1{
text-align:center;
color:#FFD700;
letter-spacing:2px;
margin-bottom:5px;
}

h3{
text-align:center;
color:#999;
font-weight:normal;
margin-bottom:20px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#151515;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,215,0,.08);
}

th{
background:#111;
color:#FFD700;
padding:14px;
text-align:center;
font-size:15px;
}

td{
padding:13px;
text-align:center;
border-bottom:1px solid #222;
font-size:15px;
}

tbody tr:hover{
background:#1d1d1d;
transition:.3s;
}

.green{
color:#00ff88;
font-weight:bold;
}

.red{
color:#ff4d4d;
font-weight:bold;
}

/* CHART */

.chart{
margin-top:20px;
overflow:hidden;
border-radius:12px;
border:1px solid #222;
box-shadow:0 0 15px rgba(255,215,0,.08);
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">

<!-- Tukar kepada nama logo anda -->
<img src="logo.png" alt="Logo">

</div>

<h1>GOLD DASHBOARD</h1>
<h3>Live Buyback Gold Price</h3>

<table>

<thead>

<tr>

<th>Purity</th>

<th>Buyback (RM/g)</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<div class="chart">

<iframe
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=5&theme=dark&style=1"
width="100%"
height="350"
frameborder="0"
scrolling="no">
</iframe>

</div>

<div class="footer">

Updated every 3 seconds

</div>

</div>

<script>

const rates = [

{name:"999",m:1},

{name:"999.9",m:1.01},

{name:"965",m:0.965},

{name:"950",m:0.950},

{name:"916 / 22K",m:0.916},

{name:"850",m:0.850},

{name:"835",m:0.835},

{name:"750 / 18K",m:0.750},

{name:"700",m:0.700},

{name:"585",m:0.585},

{name:"375",m:0.375}

];

let basePrice=380;

let prev={};

function update(){

let price=basePrice+Math.sin(Date.now()/60000)*2;

let html="";

rates.forEach(r=>{

let buyback=price*r.m*0.97;

let color="green";

if(prev[r.name]!=undefined){

if(buyback<prev[r.name]){

color="red";

}

}

prev[r.name]=buyback;

html+=`

<tr>

<td>${r.name}</td>

<td class="${color}">

RM ${buyback.toFixed(2)}

</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=html;

}

update();

setInterval(update,3000);

</script>

</body>
</html>
